<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <link rel="icon" href="./favicon.png" type="image/png">
    <title>QR code</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0c0f14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 1.2rem;
        }

        .frame {
            background: #151e28;
            border-radius: 2.2rem;
            padding: 2.2rem 2rem;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 25px 40px -10px black;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 0.7rem;
            margin-bottom: 2.2rem;
            align-items: center;
        }

        #qrInput {
            min-width: 0;
            width: 100%;
            background: #1e2a36;
            border: 1px solid #314d6b;
            border-radius: 60px;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            color: #edf4ff;
            outline: none;
            transition: 0.1s;
            box-shadow: inset 0 3px 8px #0a0e14;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        #qrInput:focus {
            border-color: #5f8ec9;
            background: #223546;
        }

        .action-btn {
            background: #1f3b5c;
            border: 1px solid #3f5f88;
            color: #d9e9ff;
            border-radius: 50px;
            width: 3.4rem;
            height: 3.4rem;
            font-size: 1.6rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 6px 12px -5px #030405;
            user-select: none;
            line-height: 1;
        }

        .action-btn:hover {
            background: #2a4b74;
            border-color: #5f8ec9;
            transform: scale(1.02);
        }

        #qrShareBtn {
            background: #1f3b5c;
            border-color: #3f5f88;
            color: #d9e9ff;
        }

        #qrShareBtn:hover {
            background: #2a4b74;
            border-color: #5f8ec9;
        }

        #toggleBtn.hidden {
            background: #3d2a2a;
            border-color: #b55a5a;
            color: #ffb6b6;
            box-shadow: 0 0 0 1px #b55a5a inset;
        }

        .qr-area {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #101722;
            border-radius: 2.5rem;
            padding: 1.8rem 1rem;
            border: 1px solid #26384f;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 380px;
            height: auto;
            aspect-ratio: 1/1;
            background: white;
            padding: 0.9rem;
            border-radius: 0;
            box-shadow: 0 0 0 1px #2f537a, 0 20px 30px -12px black;
            image-rendering: crisp-edges;
        }
    </style>
</head>

<body>
    <div class="frame">
        <div class="input-row">
            <input type="text" id="qrInput" value="" spellcheck="false" autofocus placeholder="Enter QR code">
            <button class="action-btn" id="qrShareBtn">🔗</button>
            <button class="action-btn" id="toggleBtn">👁️</button>
        </div>
        <div class="qr-area">
            <canvas id="qrCanvas"></canvas>
        </div>
    </div>

    <!-- libs -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

    <!-- utils -->
    <script>
        // update qr code
        function updateQR(input, canvas) {
            let text = input.value;
            try {
                let qr = qrcode(0, 'L');
                qr.addData(text);
                qr.make();
                let size = qr.getModuleCount() * 3;
                canvas.width = canvas.height = size;
                let ctx = canvas.getContext('2d');
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, size, size);
                ctx.fillStyle = '#000';
                for (let row = 0; row < qr.getModuleCount(); row++) {
                    for (let col = 0; col < qr.getModuleCount(); col++) {
                        if (qr.isDark(row, col)) ctx.fillRect(col * 3, row * 3, 3, 3);
                    }
                }
            } catch (e) {
                console.log(e);
                let ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(canvas.width, canvas.height);
                ctx.moveTo(canvas.width, 0);
                ctx.lineTo(0, canvas.height);
                ctx.stroke();
            }
        }
        // set hidden state
        function updateURLParameter(key, value) {
            const url = new URL(window.location);
            url.searchParams.set(key, value);
            window.history.replaceState({}, '', url);
        }
        function setHidden(input, toggleBtn, qrShareBtn, hide) {
            if (!hide) {
                input.type = 'text';
                toggleBtn.classList.remove('hidden');
                toggleBtn.innerText = "👁️";
                qrShareBtn.disabled = false;
                qrShareBtn.style.opacity = 1;
                qrShareBtn.style.cursor = "pointer";
                updateURLParameter('hidden', 'false');
            } else {
                input.type = 'password';
                toggleBtn.classList.add('hidden');
                toggleBtn.innerText = "🚫";
                qrShareBtn.disabled = true;
                qrShareBtn.style.opacity = 0.25;
                qrShareBtn.style.cursor = "default";
                updateURLParameter('hidden', 'true');
            }
        }
        function toggleHidden(input, toggleBtn, qrShareBtn) {
            setHidden(input, toggleBtn, qrShareBtn, input.type == "text")
        }
        // share button
        async function share_link(qrShareBtn, qrcode) {
            qrShareBtn.disabled = true;
            const shared_url = `${window.location.host}${window.location.pathname}?qrcode=${encodeURIComponent(qrcode)}`
            try {
                if (navigator.share) {
                    await navigator.share({
                        title: 'QR Code',
                        text: 'Check out this QR code',
                        url: shared_url
                    });
                    qrShareBtn.disabled = false;
                } else {
                    await navigator.clipboard.writeText(shared_url);
                }
                const originalText = qrShareBtn.textContent;
                qrShareBtn.textContent = '✓';
                qrShareBtn.style.background = '#1f4a3b';
                qrShareBtn.style.borderColor = '#2f8a6b';
                setTimeout(() => {
                    qrShareBtn.textContent = originalText;
                    qrShareBtn.style.background = '#1f3b5c';
                    qrShareBtn.style.borderColor = '#3f5f88';
                    qrShareBtn.disabled = false;
                }, 1000);
            } catch (err) {
                console.error('Share/copy failed: ', err);
                const originalText = qrShareBtn.textContent;
                qrShareBtn.textContent = '✗';
                qrShareBtn.style.background = '#b55a5a';
                qrShareBtn.style.borderColor = '#ff6b6b';
                setTimeout(() => {
                    qrShareBtn.textContent = originalText;
                    qrShareBtn.style.background = '#1f3b5c';
                    qrShareBtn.style.borderColor = '#3f5f88';
                    qrShareBtn.disabled = false;
                }, 1000);
            }
        }
    </script>

    <!-- main -->
    <script>
        const input = document.getElementById('qrInput');
        const canvas = document.getElementById('qrCanvas');
        const toggleBtn = document.getElementById('toggleBtn');
        const qrShareBtn = document.getElementById('qrShareBtn');
        const urlParams = new URLSearchParams(window.location.search);

        // update qr code on input
        input.addEventListener('input', () => {updateQR(input, canvas)});
        updateQR(input, canvas);

        // toggle hidden state
        setHidden(input, toggleBtn, qrShareBtn, urlParams.get("hidden") == "true")
        toggleBtn.addEventListener('click', () => toggleHidden(input, toggleBtn, qrShareBtn));

        // load qrcode from url
        if (urlParams.get("qrcode")) {input.value = urlParams.get("qrcode")}

        // share button copies url into clipboard
        qrShareBtn.addEventListener('click', async () => {share_link(qrShareBtn, input.value)});
    </script>
</body>

</html>
