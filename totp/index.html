<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <link rel="icon" href="./favicon.png" type="image/png">
    <script src="./js/otpauth.umd.min.js"></script>
    <title>Totp generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 500px;
            padding: 2rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            margin-bottom: 1.5rem;
        }

        input:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .code {
            font-size: 4rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 8px;
            color: #4a9eff;
            text-align: center;
            padding: 1.5rem;
            background-color: #1e1e1e;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            word-break: break-all;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-bar-fill {
            height: 100%;
            width: 100%;
            background-color: #4a9eff;
            transition: width 0.1s linear;
        }

        .seconds-text {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            font-family: monospace;
        }

        .hidden {
            visibility: hidden;
        }
    </style>
</head>

<body>
    <div class="container">
        <input type="text" id="secret" placeholder="Paste totp seed here..." autocomplete="off" autofocus>
        <div class="code" id="code">——————</div>
        <div id="timerContainer" class="hidden">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="seconds-text" id="secondsText">W-what? You found me???</div>
        </div>
    </div>

    <script>
        function extractSecret(input) {
            input = input.trim();
            // Check if it's an otpauth:// URL
            if (input.startsWith('otpauth://')) {
                try {
                    const parsed = OTPAuth.URI.parse(input);
                    return {
                        secret: parsed.secret.base32,
                        algorithm: parsed.algorithm,
                        digits: parsed.digits,
                        period: parsed.period
                    };
                } catch (e) {
                    throw new Error('Invalid otpauth URL');
                }
            }
            // Otherwise treat as raw secret
            return {
                secret: input.toUpperCase().replace(/\s/g, ''),
                algorithm: 'SHA1',
                digits: 6,
                period: 30
            };
        }
        function getTimeRemaining(period = 30) {
            const now = Date.now();
            const periodMs = period * 1000;
            return periodMs - (now % periodMs);
        }
        function updateCodeAndTimer() {
            const rawInput = secretInput.value;
            if (!rawInput) {
                codeDiv.textContent = '——————';
                timerContainer.classList.add('hidden');
                return;
            }
            try {
                const {secret, algorithm, digits, period} = extractSecret(rawInput);
                const totp = new OTPAuth.TOTP({
                    secret: secret,
                    digits: digits,
                    period: period,
                    algorithm: algorithm
                });
                codeDiv.textContent = totp.generate();
                const remainingMs = getTimeRemaining(period);
                const remainingSec = Math.ceil(remainingMs / 1000);
                const progressPercent = (remainingMs / (period * 1000)) * 100;
                progressFill.style.width = progressPercent + '%';
                secondsText.textContent = `updating in ${remainingSec} second${remainingSec !== 1 ? 's' : ''}`;
                timerContainer.classList.remove('hidden');
            } catch (e) {
                codeDiv.textContent = 'ERROR';
                timerContainer.classList.add('hidden');
            }
        }
    </script>

    <script>
        const secretInput = document.getElementById('secret');
        const codeDiv = document.getElementById('code');
        const timerContainer = document.getElementById('timerContainer');
        const progressFill = document.getElementById('progressFill');
        const secondsText = document.getElementById('secondsText');

        secretInput.addEventListener('input', updateCodeAndTimer);
        setInterval(() => {
            if (secretInput.value.trim()) {
                updateCodeAndTimer();
            }
        }, 100);
    </script>
</body>

</html>
